<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Single container ship at sea -->

  <!-- Ship hull -->
  <path d="M30,120 L45,100 L155,100 L170,120 Q155,135 100,135 Q45,135 30,120 Z"
        stroke="#7c8fa4" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- Deck line -->
  <line x1="48" y1="100" x2="152" y2="100" stroke="#7c8fa4" stroke-width="2" stroke-linecap="round"/>

  <!-- Containers on deck - bottom row -->
  <rect x="52" y="82" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="none"/>
  <rect x="73" y="82" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="#7c8fa4" opacity="0.2"/>
  <rect x="94" y="82" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="none"/>
  <rect x="115" y="82" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="#7c8fa4" opacity="0.2"/>

  <!-- Containers on deck - top row -->
  <rect x="62" y="64" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="#7c8fa4" opacity="0.15"/>
  <rect x="83" y="64" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="none"/>
  <rect x="104" y="64" width="18" height="16" rx="2" stroke="#7c8fa4" stroke-width="1.5" fill="#7c8fa4" opacity="0.15"/>

  <!-- Bridge/superstructure at stern -->
  <rect x="140" y="76" width="14" height="24" rx="2" stroke="#7c8fa4" stroke-width="2" fill="none"/>
  <!-- Bridge window -->
  <rect x="143" y="80" width="8" height="5" rx="1" stroke="#7c8fa4" stroke-width="1.5" fill="#7c8fa4" opacity="0.3"/>
  <!-- Smokestack -->
  <rect x="144" y="68" width="6" height="8" rx="1" stroke="#7c8fa4" stroke-width="1.5" fill="none"/>

  <!-- Ocean waves -->
  <path d="M0,140 Q20,133 40,140 Q60,147 80,140 Q100,133 120,140 Q140,147 160,140 Q180,133 200,140"
        stroke="#7c8fa4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M0,155 Q25,148 50,155 Q75,162 100,155 Q125,148 150,155 Q175,162 200,155"
        stroke="#7c8fa4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M0,170 Q30,163 60,170 Q90,177 120,170 Q150,163 180,170 Q195,173 200,170"
        stroke="#7c8fa4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.15"/>
</svg>
