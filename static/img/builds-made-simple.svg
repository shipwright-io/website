<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Source code document -->
  <g>
    <!-- Document body -->
    <rect x="20" y="30" width="60" height="78" rx="4" stroke="#7c8fa4" stroke-width="3" fill="none"/>
    <!-- Folded corner -->
    <path d="M62 30 L80 48" stroke="#7c8fa4" stroke-width="3" fill="none"/>
    <path d="M62 30 L62 48 L80 48" stroke="#7c8fa4" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <!-- Code lines -->
    <line x1="32" y1="60" x2="52" y2="60" stroke="#7c8fa4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="36" y1="70" x2="60" y2="70" stroke="#7c8fa4" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="36" y1="80" x2="54" y2="80" stroke="#7c8fa4" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="32" y1="90" x2="46" y2="90" stroke="#7c8fa4" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Arrow (the simple build process) -->
  <g>
    <!-- Arrow shaft -->
    <line x1="92" y1="69" x2="118" y2="69" stroke="#7c8fa4" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polyline points="112,61 120,69 112,77" stroke="#7c8fa4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Container image (box with container grid) -->
  <g>
    <!-- Main container box -->
    <rect x="130" y="38" width="54" height="62" rx="5" stroke="#7c8fa4" stroke-width="3" fill="none"/>
    <!-- Container grid blocks (3x2 grid representing container layers) -->
    <!-- Row 1 -->
    <rect x="138" y="48" width="14" height="10" rx="2" fill="#7c8fa4" opacity="0.35"/>
    <rect x="156" y="48" width="14" height="10" rx="2" fill="#7c8fa4" opacity="0.35"/>
    <!-- Row 2 -->
    <rect x="138" y="62" width="14" height="10" rx="2" fill="#7c8fa4" opacity="0.55"/>
    <rect x="156" y="62" width="14" height="10" rx="2" fill="#7c8fa4" opacity="0.55"/>
    <!-- Row 3 -->
    <rect x="138" y="76" width="14" height="10" rx="2" fill="#7c8fa4" opacity="0.8"/>
    <rect x="156" y="76" width="14" height="10" rx="2" fill="#7c8fa4" opacity="0.8"/>
  </g>

  <!-- Checkmark circle below (success / simplicity) -->
  <g>
    <circle cx="100" cy="145" r="24" stroke="#7c8fa4" stroke-width="3" fill="none"/>
    <polyline points="88,145 96,153 113,136" stroke="#7c8fa4" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
